name: Sync Blade Templates Package upon Release

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previoustag
        run: |
          echo "tag=$(git describe --tags --abbrev=0 HEAD^)" >> $GITHUB_OUTPUT

      - name: Check if subfolder changed
        id: diff
        run: |
          if git diff --quiet ${{ steps.previoustag.outputs.tag }} HEAD -- templates/blade; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync folder to secondary repo
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

          git clone https://github.com/vardumper/html5-blade-templates.git target
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            templates/blade/ target/
          cd target

          release_version="${GITHUB_REF_NAME#v}"

          jq --arg v "$release_version" '.version = $v' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json

          jq --arg v "$release_version" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync from ${GITHUB_REPOSITORY} release ${GITHUB_REF_NAME}" || echo "No changes"
          git push

      - name: Create release in target repo
        if: steps.diff.outputs.changed == 'true'
        run: |
          if [ -z "${GITHUB_REF_NAME}" ]; then
            echo "GITHUB_REF_NAME is empty; aborting release creation"
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --repo vardumper/html5-blade-templates \
            --notes "Auto-synced from ${GITHUB_REPOSITORY} release ${GITHUB_REF_NAME}"
