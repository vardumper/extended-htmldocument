teaser-example:
  label: Teaser Component
  description: This is an example component.
  structure:
    div:
      class: teaser
      children:
        - hgroup:
            children:
              - h3:
                  text: "Headline"
              - h4:
                  text: "Subheadline"
        - p:
            text: "Description"
        - img:
            src: "https://picsum.photos/340/140"
            alt: "Image description"
            width: 340
            height: 140
        - a:
            role: button
            text: "Read more"
            href: "#"
