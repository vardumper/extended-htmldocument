                        text: "Kangaroos are marsupials that are native to Australia."
                    - li:
                        text: "They are known for their powerful hind legs, which they use to hop around."
                    - li:
                        text: "Kangaroos can’t walk backwards due to the shape of their legs and tail."
                    - li:
