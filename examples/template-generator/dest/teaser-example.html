<div class="teaser">
	<hgroup>
		<h3>{{ entry.title }}</h3>
		<h4>{{ entry.subtitle }}</h4>
	</hgroup>
	<p>{{ entry.description }}</p>
	<img alt="{{ entry.image.alt }}" height="{{ entry.image.height }}" src="{{ entry.image.src }}" width="{{ entry.image.width }}">
	<a href="{{ entry.button.href }}" role="button">{{ entry.button.text }}</a>
</div>
