name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Determine changed PHP files
        id: changed-php
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.php' || true)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '*.php' || true)
          fi

          {
            echo 'changed_files<<EOF'
            printf '%s\n' "$CHANGED_FILES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Make quality script executable
        run: chmod +x .github/scripts/quality-gate.sh

      - name: Run quality gate
        env:
          CHANGED_FILES: ${{ steps.changed-php.outputs.changed_files }}
        run: .github/scripts/quality-gate.sh